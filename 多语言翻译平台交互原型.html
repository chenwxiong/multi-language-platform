<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多语言翻译平台交互原型</title>
<style>html,body{margin:0;padding:0;min-width:0;background:#f5f7f9}body{min-height:100vh}</style>
</head>
<body>
<div id="multilingual-prototype">
  <style>
    #multilingual-prototype {
      --background: #f5f7f9;
      --foreground: #16202a;
      --card: #ffffff;
      --card-foreground: #16202a;
      --popover: #ffffff;
      --popover-foreground: #16202a;
      --primary: #0a9b73;
      --primary-foreground: #ffffff;
      --secondary: #edf8f4;
      --secondary-foreground: #087454;
      --muted: #eef2f4;
      --muted-foreground: #72808c;
      --accent: #fff4df;
      --accent-foreground: #9a5f00;
      --destructive: #c74444;
      --border: #dfe6eb;
      --input: #d5dee4;
      --ring: #72c4a9;
      --warning: #e9a22d;
      --success: #0a9b73;
      --info: #5577cf;
      --font-size-base: 14px;
      color: var(--foreground);
      background: var(--background);
      font: 400 var(--font-size-base)/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 760px;
      width: 100%;
      box-sizing: border-box;
    }

    #multilingual-prototype *, #multilingual-prototype *::before, #multilingual-prototype *::after { box-sizing: border-box; }
    #multilingual-prototype button, #multilingual-prototype input, #multilingual-prototype select, #multilingual-prototype textarea { font: inherit; }
    #multilingual-prototype button { cursor: pointer; }
    #multilingual-prototype button:focus-visible, #multilingual-prototype input:focus-visible, #multilingual-prototype select:focus-visible, #multilingual-prototype textarea:focus-visible { outline: 3px solid color-mix(in srgb, var(--ring) 45%, transparent); outline-offset: 1px; }
    #multilingual-prototype .app-shell { display: grid; grid-template-columns: 232px minmax(0, 1fr); min-height: 760px; }
    #multilingual-prototype .sidebar { background: #102c2a; color: #d9eee8; padding: 20px 14px; display: flex; flex-direction: column; gap: 22px; }
    #multilingual-prototype .brand { display: flex; align-items: center; gap: 10px; padding: 2px 10px 12px; }
    #multilingual-prototype .brand-mark { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: #10ad7f; color: #fff; font-weight: 500; }
    #multilingual-prototype .brand-title { font-size: 16px; font-weight: 500; letter-spacing: .02em; }
    #multilingual-prototype .brand-sub { color: #91beb1; font-size: 11px; margin-top: 1px; }
    #multilingual-prototype .nav-group { display: grid; gap: 5px; }
    #multilingual-prototype .nav-label { color: #83b0a5; text-transform: uppercase; font-size: 10px; letter-spacing: .12em; padding: 0 11px 5px; }
    #multilingual-prototype .nav-btn { border: 0; background: transparent; color: #cfe8e1; text-align: left; padding: 10px 11px; border-radius: 8px; display: flex; align-items: center; gap: 10px; width: 100%; }
    #multilingual-prototype .nav-btn:hover { background: rgba(255,255,255,.08); }
    #multilingual-prototype .nav-btn.is-active { background: #0a9b73; color: #fff; }
    #multilingual-prototype .nav-icon { width: 17px; text-align: center; opacity: .95; }
    #multilingual-prototype .sidebar-foot { margin-top: auto; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 12px; }
    #multilingual-prototype .sidebar-foot strong { display: block; font-weight: 500; color: #fff; margin-bottom: 3px; }
    #multilingual-prototype .sidebar-foot span { font-size: 11px; color: #9fc8bd; }

    #multilingual-prototype .main { min-width: 0; background: var(--background); }
    #multilingual-prototype .topbar { min-height: 66px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 24px; }
    #multilingual-prototype .crumbs { display: flex; align-items: center; gap: 8px; color: var(--muted-foreground); font-size: 12px; }
    #multilingual-prototype .crumbs strong { color: var(--foreground); font-weight: 500; }
    #multilingual-prototype .top-actions { display: flex; align-items: center; gap: 10px; }
    #multilingual-prototype .search { width: min(280px, 30vw); border: 1px solid var(--input); border-radius: 7px; padding: 8px 11px; background: var(--card); color: var(--foreground); }
    #multilingual-prototype .profile { display: flex; align-items: center; gap: 8px; color: var(--muted-foreground); }
    #multilingual-prototype .avatar { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: #315c91; font-size: 12px; }
    #multilingual-prototype .content { padding: 22px 24px 34px; max-width: 1440px; margin: 0 auto; }
    #multilingual-prototype .page-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
    #multilingual-prototype h1, #multilingual-prototype h2, #multilingual-prototype h3 { margin: 0; font-weight: 500; }
    #multilingual-prototype h1 { font-size: 24px; letter-spacing: -.02em; }
    #multilingual-prototype h2 { font-size: 17px; }
    #multilingual-prototype h3 { font-size: 14px; }
    #multilingual-prototype .eyebrow { color: var(--primary); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
    #multilingual-prototype .page-desc { color: var(--muted-foreground); margin: 5px 0 0; font-size: 13px; }
    #multilingual-prototype .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    #multilingual-prototype .btn { border: 1px solid var(--border); background: var(--card); color: var(--foreground); border-radius: 7px; padding: 8px 12px; min-height: 34px; }
    #multilingual-prototype .btn:hover { border-color: var(--primary); color: var(--secondary-foreground); }
    #multilingual-prototype .btn-primary { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
    #multilingual-prototype .btn-primary:hover { color: #fff; background: #087e5e; }
    #multilingual-prototype .btn-soft { background: var(--secondary); color: var(--secondary-foreground); border-color: #c9eee0; }
    #multilingual-prototype .btn-danger { color: var(--destructive); }
    #multilingual-prototype .btn-small { padding: 5px 8px; min-height: 28px; font-size: 12px; }
    #multilingual-prototype .tag { display: inline-flex; align-items: center; gap: 5px; border-radius: 99px; padding: 3px 8px; font-size: 11px; color: var(--muted-foreground); background: var(--muted); white-space: nowrap; }
    #multilingual-prototype .tag-green { color: #067554; background: #e2f7ef; }
    #multilingual-prototype .tag-orange { color: #925e05; background: #fff1d7; }
    #multilingual-prototype .tag-blue { color: #3d5ca8; background: #e9efff; }
    #multilingual-prototype .tag-red { color: #a93c3c; background: #ffebeb; }
    #multilingual-prototype .status-link { border: 0; cursor: pointer; font: inherit; }
    #multilingual-prototype .status-link:hover { text-decoration: underline; }
    #multilingual-prototype .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 17px; }
    #multilingual-prototype .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    #multilingual-prototype .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    #multilingual-prototype .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    #multilingual-prototype .stat-label { color: var(--muted-foreground); font-size: 12px; }
    #multilingual-prototype .stat-value { font-size: 26px; margin: 7px 0 2px; font-weight: 500; }
    #multilingual-prototype .stat-note { color: var(--muted-foreground); font-size: 11px; }
    #multilingual-prototype .section { margin-top: 18px; }
    #multilingual-prototype .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    #multilingual-prototype .section-head span { color: var(--muted-foreground); font-size: 12px; }
    #multilingual-prototype .project-card { display: grid; gap: 13px; cursor: pointer; transition: transform .15s ease, border-color .15s ease; }
    #multilingual-prototype .project-card:hover { border-color: #9bd4c1; transform: translateY(-1px); }
    #multilingual-prototype .project-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    #multilingual-prototype .project-title { font-weight: 500; }
    #multilingual-prototype .project-meta { color: var(--muted-foreground); font-size: 12px; }
    #multilingual-prototype .progress { height: 7px; background: #e9eef0; border-radius: 99px; overflow: hidden; }
    #multilingual-prototype .progress > i { display: block; height: 100%; background: var(--primary); border-radius: inherit; }
    #multilingual-prototype .project-foot { display: flex; justify-content: space-between; align-items: center; color: var(--muted-foreground); font-size: 11px; }
    #multilingual-prototype .mini-list { display: grid; gap: 0; }
    #multilingual-prototype .mini-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    #multilingual-prototype .mini-row:last-child { border-bottom: 0; }
    #multilingual-prototype .mini-row strong { display: block; font-weight: 500; }
    #multilingual-prototype .mini-row span { display: block; font-size: 12px; color: var(--muted-foreground); margin-top: 2px; }
    #multilingual-prototype .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 9px; background: var(--card); }
    #multilingual-prototype table { width: 100%; border-collapse: collapse; min-width: 780px; }
    #multilingual-prototype th, #multilingual-prototype td { padding: 11px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
    #multilingual-prototype th { color: var(--muted-foreground); font-size: 11px; font-weight: 500; background: #f8fafb; white-space: nowrap; }
    #multilingual-prototype td { font-size: 12px; }
    #multilingual-prototype tr:last-child td { border-bottom: 0; }
    #multilingual-prototype .row-link { color: #146b58; cursor: pointer; font-weight: 500; }
    #multilingual-prototype .row-link:hover { text-decoration: underline; }
    #multilingual-prototype .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px; background: var(--card); border: 1px solid var(--border); border-bottom: 0; border-radius: 9px 9px 0 0; }
    #multilingual-prototype .field { border: 1px solid var(--input); background: var(--card); border-radius: 7px; padding: 8px 10px; color: var(--foreground); min-height: 34px; }
    #multilingual-prototype .field:focus { border-color: var(--primary); }
    #multilingual-prototype .field-grow { flex: 1 1 220px; }
    #multilingual-prototype .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
    #multilingual-prototype .tab { border: 0; background: transparent; color: var(--muted-foreground); padding: 10px 12px; border-bottom: 2px solid transparent; white-space: nowrap; }
    #multilingual-prototype .tab.is-active { color: var(--primary); border-bottom-color: var(--primary); }
    #multilingual-prototype .split { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(280px, .75fr); gap: 15px; align-items: start; }
    #multilingual-prototype .editor { display: grid; gap: 12px; }
    #multilingual-prototype .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #multilingual-prototype .label { display: grid; gap: 6px; color: var(--muted-foreground); font-size: 11px; }
    #multilingual-prototype textarea.field { min-height: 90px; resize: vertical; }
    #multilingual-prototype .source-box { background: #f7faf9; border: 1px solid #d7eae2; border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.55; }
    #multilingual-prototype .check-list { display: grid; gap: 9px; }
    #multilingual-prototype .check-item { display: flex; gap: 8px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    #multilingual-prototype .check-item:last-child { border-bottom: 0; }
    #multilingual-prototype .check-dot { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; flex: 0 0 auto; }
    #multilingual-prototype .check-ok { background: #e4f8f0; color: #087454; }
    #multilingual-prototype .check-warn { background: #fff1d7; color: #9a5f00; }
    #multilingual-prototype .check-fail { background: #ffe9e9; color: #a93c3c; }
    #multilingual-prototype .muted { color: var(--muted-foreground); }
    #multilingual-prototype .callout { border-left: 3px solid var(--primary); background: var(--secondary); padding: 11px 12px; border-radius: 0 8px 8px 0; font-size: 12px; }
    #multilingual-prototype .layout-preview { display: grid; grid-template-columns: 225px minmax(0,1fr) 270px; gap: 14px; align-items: start; }
    #multilingual-prototype .page-thumb-list { display: grid; gap: 9px; }
    #multilingual-prototype .page-thumb { border: 1px solid var(--border); border-radius: 7px; padding: 7px; background: #f9fbfb; cursor: pointer; }
    #multilingual-prototype .page-thumb.is-active { border-color: var(--primary); box-shadow: 0 0 0 2px #bfe8da; }
    #multilingual-prototype .page-paper { aspect-ratio: .72; background: #fff; border: 1px solid #d6dcdf; padding: 18px 16px; box-shadow: 0 7px 22px rgba(26,47,54,.08); position: relative; overflow: hidden; }
    #multilingual-prototype .paper-title { font-size: 15px; font-weight: 500; text-align: center; margin-bottom: 12px; }
    #multilingual-prototype .paper-line { height: 5px; border-radius: 3px; background: #dfe6e8; margin: 6px 0; }
    #multilingual-prototype .paper-line.short { width: 62%; }
    #multilingual-prototype .paper-line.medium { width: 82%; }
    #multilingual-prototype .paper-block { border: 1px dashed #a7d8c6; background: #effaf5; border-radius: 6px; padding: 8px; margin: 11px 0; }
    #multilingual-prototype .paper-block.warn { border-color: #edbb6d; background: #fff7e9; }
    #multilingual-prototype .paper-block strong { font-size: 10px; color: #2e6f5b; }
    #multilingual-prototype .paper-block span { display: block; font-size: 9px; line-height: 1.45; margin-top: 4px; }
    #multilingual-prototype .issue-list { display: grid; gap: 8px; }
    #multilingual-prototype .issue { border: 1px solid var(--border); border-left: 3px solid var(--warning); border-radius: 7px; padding: 9px 10px; font-size: 12px; background: var(--card); }
    #multilingual-prototype .issue strong { display: block; font-weight: 500; margin-bottom: 3px; }
    #multilingual-prototype .avatar-stack { display: flex; align-items: center; }
    #multilingual-prototype .avatar-stack .avatar { margin-left: -5px; border: 2px solid var(--card); }
    #multilingual-prototype .avatar-stack .avatar:first-child { margin-left: 0; }
    #multilingual-prototype .modal-backdrop { position: fixed; inset: 0; background: rgba(17,31,36,.38); display: grid; place-items: center; padding: 20px; z-index: 10; }
    #multilingual-prototype .modal { width: min(600px, 100%); max-height: calc(100vh - 40px); overflow: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 70px rgba(23,41,46,.22); }
    #multilingual-prototype .modal-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border); }
    #multilingual-prototype .modal-body { padding: 18px; display: grid; gap: 12px; }
    #multilingual-prototype .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    #multilingual-prototype .close-btn { border: 0; background: transparent; color: var(--muted-foreground); font-size: 19px; }
    #multilingual-prototype .toast { position: fixed; right: 22px; bottom: 22px; background: #102c2a; color: #fff; border-radius: 9px; padding: 11px 14px; box-shadow: 0 10px 30px rgba(0,0,0,.2); z-index: 20; font-size: 12px; }
    #multilingual-prototype .empty { text-align: center; padding: 34px; color: var(--muted-foreground); }
    #multilingual-prototype .timeline { display: grid; gap: 0; }
    #multilingual-prototype .timeline-row { display: grid; grid-template-columns: 104px 16px minmax(0,1fr); gap: 10px; padding: 10px 0; }
    #multilingual-prototype .timeline-date { color: var(--muted-foreground); font-size: 11px; }
    #multilingual-prototype .timeline-dot { width: 10px; height: 10px; border: 2px solid var(--primary); border-radius: 50%; margin-top: 4px; background: var(--card); position: relative; }
    #multilingual-prototype .timeline-row:not(:last-child) .timeline-dot::after { content: ""; position: absolute; width: 1px; height: 41px; background: #cfe6dd; left: 2px; top: 8px; }
    #multilingual-prototype .timeline-body strong { font-size: 12px; font-weight: 500; }
    #multilingual-prototype .timeline-body p { margin: 2px 0 0; color: var(--muted-foreground); font-size: 11px; }
    @media (max-width: 1050px) {
      #multilingual-prototype .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      #multilingual-prototype .layout-preview { grid-template-columns: 180px minmax(0,1fr); }
      #multilingual-prototype .layout-preview > .card:last-child { grid-column: 1 / -1; }
    }
    @media (max-width: 760px) {
      #multilingual-prototype .app-shell { grid-template-columns: minmax(0, 1fr); }
      #multilingual-prototype .sidebar, #multilingual-prototype .nav-group, #multilingual-prototype .brand, #multilingual-prototype .main { min-width: 0; max-width: 100%; }
      #multilingual-prototype .sidebar { position: static; padding: 12px; gap: 12px; overflow: hidden; }
      #multilingual-prototype .nav-group { display: flex; overflow-x: auto; }
      #multilingual-prototype .nav-label, #multilingual-prototype .sidebar-foot { display: none; }
      #multilingual-prototype .nav-btn { width: auto; white-space: nowrap; }
      #multilingual-prototype .topbar { padding: 12px 15px; }
      #multilingual-prototype .content { padding: 16px 14px 28px; }
      #multilingual-prototype .top-actions .search { display: none; }
      #multilingual-prototype .grid-4, #multilingual-prototype .grid-3, #multilingual-prototype .grid-2, #multilingual-prototype .split { grid-template-columns: 1fr; }
      #multilingual-prototype .page-head { flex-direction: column; }
      #multilingual-prototype .actions { justify-content: flex-start; }
      #multilingual-prototype .layout-preview { grid-template-columns: 1fr; }
      #multilingual-prototype .layout-preview > .card:last-child { grid-column: auto; }
    }
  </style>

  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark">译</div>
        <div><div class="brand-title">多语言协作平台</div><div class="brand-sub">Company Translation Hub</div></div>
      </div>
      <div class="nav-group">
        <div class="nav-label">平台导航</div>
        <button class="nav-btn is-active" data-view="overview"><span class="nav-icon">⌂</span>工作台</button>
        <button class="nav-btn" data-view="projects"><span class="nav-icon">▣</span>项目中心</button>
        <button class="nav-btn" data-view="glossary"><span class="nav-icon">◇</span>语言资产中心</button>
        <button class="nav-btn" data-view="tasks"><span class="nav-icon">✓</span>任务中心</button>
        <button class="nav-btn" data-view="permissions"><span class="nav-icon">♙</span>权限与组织</button>
        <button class="nav-btn" data-view="settings"><span class="nav-icon">⚙</span>系统设置</button>
      </div>
      <div class="sidebar-foot"><strong>统一模型</strong><span>业务线管权限 · 交付单元管流程 · 内容形态可扩展</span></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="crumbs"><span>公司级多语言平台</span><b>/</b><strong id="crumbText">工作台</strong></div>
        <div class="top-actions"><input class="search" placeholder="搜索项目、Key、术语或任务" aria-label="全局搜索"><div class="profile"><span>陈产品</span><span class="avatar">陈</span></div></div>
      </header>
      <section class="content" id="appView"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script>
    (() => {
      const root = document.getElementById('multilingual-prototype');
      if (!root) return;
      const viewRoot = root.querySelector('#appView');
      const modalRoot = root.querySelector('#modalRoot');
      const toastRoot = root.querySelector('#toastRoot');
      if (!viewRoot || !modalRoot || !toastRoot) return;
      const state = {
        view: 'overview',
        spaceId: 'SPACE-65W',
        domainKey: 'aiot',

        projectId: 'P-2402',

        segmentFilter: '全部',

        sourceQuery: '',

        layoutIssues: [

          { type: '字体覆盖', level: '阻塞型', detail: '阿拉伯语页面尚未完成字体检查。', owner: '周设计', status: '未开始' },

            { key: 'packaging', name: '包装说明书', subtitle: '说明书 / 彩盒 / 插脚提示语', status: '翻译中', statusClass: 'tag-orange', progress: 68, detail: '128 个内容单元 · 5 个语种', projectId: 'P-2402' },

        if (action === 'open-space') { state.spaceId = target.dataset.space || state.spaceId; setView('space-summary'); return; }

        if (action === 'edit-segment') { state.segmentId = target.dataset.id || state.segmentId; openModal('edit-segment'); return; }

        if (action === 'save-task') { closeModal(); toast('任务已创建并通知负责人'); render(); return; }
        if (action === 'save-assignment') { let t = state.tasks.find((item)=>item.id===state.taskId); const owner = root.querySelector('#assignOwner')?.value || '待指派'; if (!t) { t = { id: state.taskId, projectId: project().id, title: `${project().name} · 内容翻译任务`, scope: `${deliveryUnit(project())} · 当前内容范围`, lang: '多语种', assignee: '待指派', progress: 0, due: project().due || '2026-07-23', status: '待领取', statusClass: 'tag-red', count: '0 / 0' }; state.tasks.push(t); } t.assignee = owner; t.status = owner === '待指派' ? '待领取' : '处理中'; t.statusClass = owner === '待指派' ? 'tag-red' : 'tag-orange'; closeModal(); toast(owner === '待指派' ? '任务仍待指派' : `任务已指派给${owner}并发送通知`); render(); return; }
        if (action === 'reuse-segment') { const s = segment(); s.de = s.de || 'Verwenden Sie dieses Produkt nicht in Umgebungen mit hohen Temperaturen, hoher Luftfeuchtigkeit oder in geschlossenen Räumen.'; s.fr = s.fr || 'N’utilisez pas ce produit dans des environnements à température élevée, humides ou fermés.'; closeModal(); toast('已复用相似句段，仍需人工确认'); render(); return; }

        if (action === 'save-comment') { const text = root.querySelector('#commentText')?.value?.trim() || '已记录一条修改意见'; const anchor = root.querySelector('#commentAnchor')?.value || '当前页面'; state.comments.unshift({ who: '陈产品', avatar: '陈', color: '#315c91', text: `${anchor}：${text}`, time: '刚刚', status: '待处理' }); closeModal(); toast('评论已提交，并同步到评审与交付'); render(); return; }

        if (action === 'confirm-delivery') { openModal('delivery-confirm'); return; }

        if (action === 'finalize') { toast('仍有 1 个阻塞型排版问题，暂不能生成定稿版本'); return; }
        if (action === 'publish') { toast('发布检查完成：缺少西班牙语 12 条，暂不能发布'); return; }
        if (action === 'resolve-comment') { toast('评论状态已更新'); return; }
        if (action === 'new-comment') { openModal('new-comment'); return; }
        if (action === 'new-issue') { openModal('new-issue'); return; }

        if (action === 'invite-member' || action === 'new-role') { toast('权限配置器已打开（原型演示）'); return; }
